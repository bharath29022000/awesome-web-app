version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: mydatabase\n    ports:\n      - '5432:5432'\n\n  redis:\n    image: redis:latest\n    ports:\n      - '6379:6379'\n\n  node:\n    image: node:latest\n    working_dir: /usr/src/app\n    volumes:\n      - .:/usr/src/app\n    ports:\n      - '3000:3000'\n    command: npm start\n    depends_on:\n      - postgres\n      - redis\n